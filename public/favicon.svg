<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background transparent -->

  <!-- Antennae / ear nubs -->
  <rect x="8"  y="2" width="4" height="4" fill="#3a7a28"/>
  <rect x="20" y="2" width="4" height="4" fill="#3a7a28"/>

  <!-- Head -->
  <rect x="6"  y="6"  width="20" height="14" fill="#4caf34"/>
  <!-- Head shading (top highlight) -->
  <rect x="7"  y="7"  width="18" height="2"  fill="#6cd64e"/>
  <!-- Head shadow (bottom) -->
  <rect x="7"  y="17" width="18" height="2"  fill="#389a22"/>

  <!-- Eyes – large red with dark pupil + white catchlight -->
  <!-- Left eye -->
  <rect x="8"  y="8"  width="6" height="6" fill="#cc1111"/>
  <rect x="8"  y="8"  width="6" height="6" fill="#ee2222"/>
  <rect x="9"  y="9"  width="4" height="4" fill="#bb0000"/>
  <rect x="10" y="10" width="2" height="2" fill="#220000"/>
  <rect x="10" y="9"  width="1" height="1" fill="#ffffff"/>
  <!-- Right eye -->
  <rect x="18" y="8"  width="6" height="6" fill="#ee2222"/>
  <rect x="19" y="9"  width="4" height="4" fill="#bb0000"/>
  <rect x="20" y="10" width="2" height="2" fill="#220000"/>
  <rect x="20" y="9"  width="1" height="1" fill="#ffffff"/>

  <!-- Mouth – dark gap with teeth -->
  <rect x="8"  y="16" width="16" height="4" fill="#1a1a1a"/>
  <rect x="9"  y="16" width="2"  height="3" fill="#f0ecd8"/>
  <rect x="12" y="16" width="2"  height="3" fill="#f0ecd8"/>
  <rect x="15" y="16" width="2"  height="3" fill="#f0ecd8"/>
  <rect x="18" y="16" width="2"  height="3" fill="#f0ecd8"/>
  <rect x="21" y="16" width="2"  height="3" fill="#f0ecd8"/>

  <!-- Neck -->
  <rect x="12" y="20" width="8" height="2" fill="#389a22"/>

  <!-- Body -->
  <rect x="8"  y="22" width="16" height="8" fill="#4caf34"/>
  <!-- Body highlight -->
  <rect x="9"  y="23" width="14" height="2" fill="#6cd64e"/>
  <!-- Body shadow -->
  <rect x="9"  y="28" width="14" height="1" fill="#389a22"/>

  <!-- Body panel / chest detail -->
  <rect x="12" y="24" width="8" height="4" fill="#3a9a28"/>
  <rect x="13" y="25" width="6" height="2" fill="#5abc3e"/>

  <!-- Feet / legs stubs -->
  <rect x="9"  y="30" width="5" height="2" fill="#3a7a28"/>
  <rect x="18" y="30" width="5" height="2" fill="#3a7a28"/>
</svg>
