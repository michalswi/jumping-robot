<svg xmlns="http://www.w3.org/2000/svg" width="66" height="30" viewBox="0 0 66 30">
  <!--
    Simple manga-style bird, 66×30, FACING RIGHT.
    Obstacle.ts calls setFlipX(true) on all flying enemies,
    so it will appear facing LEFT (toward the player) in-game.
  -->

  <!-- Forked swallow tail -->
  <polygon points="12,15 0,6  5,16"  fill="#0a1428"/>
  <polygon points="12,16 0,25 5,15"  fill="#0a1428"/>
  <polygon points="12,15 1,7  4,15"  fill="#2a4a7f"/>
  <polygon points="12,16 1,24 4,16"  fill="#2a4a7f"/>

  <!-- Wing — one large swept shape, layered for depth -->
  <polygon points="10,22 28,1  44,19" fill="#0a1428"/>
  <polygon points="11,21 28,3  42,19" fill="#3a6aaf"/>
  <polygon points="18,20 30,5  42,19" fill="#5a90d8"/>
  <polygon points="26,19 33,8  40,19" fill="#8abce8"/>
  <!-- Wing leading-edge highlight -->
  <polygon points="20,15 28,4  33,13" fill="#b0d8f8"/>

  <!-- Body -->
  <ellipse cx="39" cy="22" rx="16" ry="8"   fill="#0a1428"/>
  <ellipse cx="39" cy="22" rx="14" ry="6.5" fill="#2a4a7f"/>
  <!-- Breast warm colour -->
  <ellipse cx="36" cy="24" rx="9"  ry="4"   fill="#d85818"/>
  <ellipse cx="34" cy="25" rx="5"  ry="2.5" fill="#f09050"/>

  <!-- Head -->
  <circle cx="51" cy="14" r="12"  fill="#0a1428"/>
  <circle cx="51" cy="14" r="10"  fill="#2a4a7f"/>
  <!-- Head sheen -->
  <ellipse cx="48" cy="9" rx="6" ry="3.5" fill="#3a6aaf"/>
  <ellipse cx="47" cy="7" rx="3" ry="2"   fill="#5a90d8"/>

  <!-- Beak -->
  <polygon points="58,11 66,14 58,18" fill="#0a1428"/>
  <polygon points="58,12 65,14 58,17" fill="#f0c000"/>
  <polygon points="58,14 65,14 58,17" fill="#c09000"/>
  <polygon points="58,12 63,13 58,14" fill="#ffe060"/>

  <!-- Eye -->
  <ellipse cx="47" cy="13" rx="6.5" ry="6"   fill="#0a1428"/>
  <ellipse cx="47" cy="13" rx="5.5" ry="5.5" fill="#ffffff"/>
  <ellipse cx="47" cy="14" rx="4"   ry="4.5" fill="#111111"/>
  <!-- Catchlights -->
  <circle  cx="50" cy="11" r="2"   fill="#ffffff"/>
  <circle  cx="44" cy="15" r="1"   fill="#ffffff"/>
</svg>
